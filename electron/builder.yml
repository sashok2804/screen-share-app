# electron-builder configuration mirrored from package.json "build".
# Kept in sync; either source is authoritative — package.json takes precedence
# when both are present, so this file is mainly for human-readable reference.

appId: com.sashok2804.screenshare
productName: Screen Share

directories:
  output: dist
  buildResources: build

files:
  - '**/*'
  - '!**/*.map'
  - '!dist/**'
  - '!out/**'

# FFmpeg binary bundled into resources/ffmpeg.exe at install time.
# `electron/scripts/download-ffmpeg.cjs` populates bin/ffmpeg.exe — run
# `npm -w electron run download-ffmpeg` before `npm -w electron run build`.
extraResources:
  - from: bin/ffmpeg.exe
    to: ffmpeg.exe

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Screen Share
  # We don't use electron-updater's differential download, and generating the
  # blockmap pulls in `@noble/hashes/blake2.js` which is broken on Node 22.11
  # (app-builder-lib uses an ESM-incompatible require path). Disable it.
  differentialPackage: false

protocols:
  - name: Screen Share URL
    schemes:
      - screen-share
    role: Viewer
